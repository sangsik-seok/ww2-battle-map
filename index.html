<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080906">
<title>2차 세계대전 인터랙티브 지도</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080906;--paper:#111209;--tan:#c8b88a;--tan2:#9e8e60;
  --allied:#1e3d6e;--axis:#6e1e1e;--neutral:#252b1a;--ocean:#0b1520;
  --vichy:#3d2a1a;
  --text:#e8dfc0;--muted:rgba(200,184,138,0.6);--border:rgba(200,184,138,0.18);
  --panel:rgba(8,9,6,0.97);
}
html,body{width:100%;height:100%;overflow:hidden;background:#080906;color:var(--text);font-family:'Barlow',sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;background:#080906;}

/* HEADER */
#header{flex-shrink:0;background:var(--paper);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:10px;z-index:20;flex-wrap:wrap;}
#header-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:0.1em;color:var(--tan);white-space:nowrap;}
#date-display{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--tan);background:rgba(200,184,138,0.1);border:1px solid rgba(200,184,138,0.25);border-radius:3px;padding:3px 8px;white-space:nowrap;}
.hbtn{background:rgba(200,184,138,0.08);border:1px solid rgba(200,184,138,0.2);border-radius:3px;color:var(--tan);height:28px;padding:0 9px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent;transition:background .15s;}
.hbtn:hover{background:rgba(200,184,138,0.16);}
.hbtn.active{background:rgba(200,184,138,0.2);border-color:rgba(200,184,138,0.45);color:#fff;}
#filter-group{display:flex;gap:5px;align-items:center;}
#filter-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);}
#speed-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
#speed-wrap label{font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
#speed-slider{-webkit-appearance:none;width:65px;height:3px;background:rgba(200,184,138,0.2);border-radius:2px;outline:none;}
#speed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--tan);cursor:pointer;}
#speed-val{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--tan);min-width:22px;}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;}
#map-wrap{position:relative;flex:1;overflow:hidden;background:#0b1520;}
#map-svg{width:100%;height:100%;display:block;cursor:grab;background:#0b1520;}
#map-svg.dragging{cursor:grabbing;}

/* TIMELINE */
#timeline-bar{position:absolute;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);padding:7px 13px 9px;z-index:10;padding-bottom:max(9px,env(safe-area-inset-bottom));}
#tl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
#tl-phase{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--tan);letter-spacing:0.06em;}
#tl-hint{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);}
#timeline-labels{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);margin-bottom:3px;}
#timeline-slider{-webkit-appearance:none;width:100%;height:4px;background:rgba(200,184,138,0.15);border-radius:2px;outline:none;cursor:pointer;}
#timeline-slider::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--tan);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 5px rgba(200,184,138,0.4);}
#event-ticks{position:relative;height:12px;margin-top:3px;}
.tick{position:absolute;transform:translateX(-50%);width:2px;height:5px;border-radius:1px;cursor:pointer;top:0;transition:height .1s;}
.tick:hover{height:10px;}
.tick.allied{background:#2980b9;}.tick.axis{background:#c0392b;}
.tick.hidden-tick{display:none;}

/* SIDE PANEL */
#side-panel{width:285px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;letter-spacing:0.06em;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;-webkit-tap-highlight-color:transparent;}
.tab.active{color:var(--tan);border-bottom-color:var(--tan);}
#panel-content{flex:1;overflow-y:auto;padding:11px;}
#panel-content::-webkit-scrollbar{width:3px;}
#panel-content::-webkit-scrollbar-thumb{background:rgba(200,184,138,0.15);border-radius:2px;}

/* BATTLE DETAIL */
.b-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.07em;color:var(--tan);line-height:1.1;margin-bottom:2px;}
.b-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(200,184,138,0.65);margin-bottom:7px;}
.b-badge{display:inline-block;padding:3px 8px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.1em;margin-bottom:9px;}
.ba{background:rgba(41,128,185,0.2);color:#6ab4e8;border:1px solid rgba(41,128,185,0.4);}
.bx{background:rgba(192,57,43,0.2);color:#f07060;border:1px solid rgba(192,57,43,0.4);}
.b-desc{font-size:12px;line-height:1.75;color:rgba(232,223,192,0.82);margin-bottom:10px;}
.stat-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(200,184,138,0.12);font-size:11px;gap:6px;}
.stat-label{color:rgba(200,184,138,0.65);font-family:'Share Tech Mono',monospace;font-size:9px;flex-shrink:0;padding-top:1px;}
.stat-val{color:var(--tan);font-weight:500;text-align:right;line-height:1.4;}
.b-commanders{margin-top:10px;}
.b-cmdr-title{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(200,184,138,0.65);letter-spacing:0.08em;margin-bottom:5px;}
.cmdr-row{display:flex;gap:8px;margin-bottom:4px;}
.cmdr-side{font-size:9px;font-family:'Share Tech Mono',monospace;padding:2px 6px;border-radius:2px;flex-shrink:0;}
.cmdr-allied{background:rgba(41,128,185,0.2);color:#6ab4e8;}
.cmdr-axis{background:rgba(192,57,43,0.2);color:#f07060;}
.cmdr-name{font-size:12px;color:var(--text);font-weight:500;}

/* BATTLE LIST */
.battle-item{padding:8px 10px;margin-bottom:4px;background:rgba(200,184,138,0.03);border:1px solid rgba(200,184,138,0.12);border-radius:3px;cursor:pointer;transition:background .15s,border-color .15s;-webkit-tap-highlight-color:transparent;}
.battle-item:hover,.battle-item.active-item{background:rgba(200,184,138,0.08);border-color:rgba(200,184,138,0.28);}
.bi-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.05em;color:var(--tan);}
.bi-meta{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(200,184,138,0.6);margin-top:1px;}
.ri-a{float:right;font-size:9px;padding:1px 5px;border-radius:2px;background:rgba(41,128,185,0.18);color:#6ab4e8;font-family:'Share Tech Mono',monospace;}
.ri-x{float:right;font-size:9px;padding:1px 5px;border-radius:2px;background:rgba(192,57,43,0.18);color:#f07060;font-family:'Share Tech Mono',monospace;}

/* AUTO HIGHLIGHT */
#auto-highlight{padding:8px 10px;margin-bottom:6px;border:1px solid rgba(200,184,138,0.22);border-radius:3px;background:rgba(200,184,138,0.05);display:none;}
#auto-highlight.visible{display:block;}
.ah-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--tan);letter-spacing:0.08em;margin-bottom:4px;}
.ah-name{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--tan);cursor:pointer;line-height:1.2;}
.ah-name:hover{color:#fff;}
.ah-meta{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(200,184,138,0.65);}

/* LEGEND */
#legend{padding:9px 11px;border-top:1px solid var(--border);flex-shrink:0;}
.legend-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:10px;color:rgba(200,184,138,0.75);}
.ls{width:14px;height:8px;border-radius:1px;flex-shrink:0;}
.ls.dot{border-radius:50%;width:9px;height:9px;}

/* TOOLTIP */
#map-tooltip{position:absolute;pointer-events:none;display:none;z-index:50;background:rgba(8,9,6,0.97);border:1px solid rgba(200,184,138,0.25);border-radius:3px;padding:7px 10px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text);max-width:200px;line-height:1.7;}

/* MAP ELEMENTS */
.country{stroke:#0d1008;stroke-width:0.3;transition:fill 0.7s ease;}
.country:hover{stroke:rgba(200,184,138,0.5);stroke-width:0.6;}
.frontline{fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;opacity:0.75;pointer-events:none;}
.frontline-allied{stroke:#3a9fd8;stroke-dasharray:4,3;}
.frontline-axis{stroke:#d44030;}
.battle-marker{cursor:pointer;}
.bm-dot{transition:r .15s;}
.battle-marker:hover .bm-dot{r:5;}
.bm-past{opacity:0.3;}

/* SIZE LEGEND */
#size-legend{position:absolute;bottom:90px;left:12px;background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:7px 10px;font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);z-index:9;}
.sl-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}

/* LOADING */
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#0b1520;z-index:100;}
#loading-text{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);}
#loading-bar-wrap{width:180px;height:2px;background:rgba(200,184,138,0.1);border-radius:2px;}
#loading-bar{height:100%;width:0%;background:var(--tan);border-radius:2px;transition:width .3s;}

/* MOBILE portrait */
@media(max-width:680px){
  #side-panel{position:absolute;bottom:80px;left:0;right:0;width:auto;height:46vh;border-left:none;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .3s ease;z-index:15;}
  #side-panel.open{transform:translateY(0);}
  #mpanel-btn{position:absolute;bottom:82px;right:11px;z-index:16;background:var(--paper);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--tan);}
  #speed-wrap,#filter-group,#filter-label{display:none;}
  #size-legend{display:none;}
  #timeline-bar{padding-bottom:max(14px,env(safe-area-inset-bottom));}
}

/* MOBILE landscape (height < 500px) — panel collapsible, map takes full width */
@media(pointer: coarse) and (max-height:500px){
  #side-panel{
    position:absolute;right:0;top:0;bottom:0;
    width:280px;height:100%;
    border-left:1px solid var(--border);border-top:none;
    transform:translateX(100%);transition:transform .3s ease;z-index:15;
    display:flex;flex-direction:column;overflow:hidden;
  }
  #side-panel.open{transform:translateX(0);}
  #panel-content{flex:1;overflow-y:auto;min-height:0;}
  #legend{flex-shrink:0;overflow-y:auto;max-height:35vh;}
  #mpanel-btn{
    position:absolute;right:11px;top:50%;transform:translateY(-50%);
    z-index:16;background:var(--paper);border:1px solid var(--border);
    border-radius:50%;width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;cursor:pointer;color:var(--tan);bottom:auto;
  }
  #mpanel-btn.panel-open{right:291px;}
  #speed-wrap,#filter-group,#filter-label{display:none;}
  #size-legend{display:none !important;}
  #legend{padding:6px 10px;}
  .legend-row{margin-bottom:4px;font-size:12px;}
}

/* MOBILE/tablet touch — general readability */
@media(pointer: coarse){
  #size-legend{display:block;}
  .tab{font-size:13px;padding:12px 8px;letter-spacing:0.04em;}
  .b-name{font-size:26px;}
  .b-meta{font-size:12px;}
  .b-badge{font-size:11px;padding:4px 10px;}
  .b-desc{font-size:14px;line-height:1.8;}
  .stat-row{font-size:13px;padding:7px 0;}
  .stat-label{font-size:12px;}
  .stat-val{font-size:13px;}
  .b-cmdr-title{font-size:11px;}
  .cmdr-side{font-size:11px;}
  .cmdr-name{font-size:14px;}
  .bi-name{font-size:17px;}
  .bi-meta{font-size:11px;}
  .ri-a,.ri-x{font-size:11px;padding:2px 7px;}
  .ah-label{font-size:11px;}
  .ah-name{font-size:20px;}
  .ah-meta{font-size:11px;}
  #legend{padding:12px 14px;}
  .legend-row{font-size:14px;font-weight:500;color:rgba(200,184,138,0.92);margin-bottom:8px;gap:10px;}
  .ls{width:20px;height:11px;}
  .ls.dot{width:13px;height:13px;}
  #tl-phase{font-size:11px;}
  #timeline-labels{font-size:10px;}
}

@media(min-width:681px){#mpanel-btn{display:none;}}</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-title">⚔ 제2차 세계대전</div>
    <div id="date-display">1939.09</div>
    <button class="hbtn" id="play-btn">▶ 재생</button>
    <span id="filter-label">전투 표시:</span>
    <div id="filter-group">
      <button class="hbtn active" data-filter="europe">유럽 전투</button>
      <button class="hbtn active" data-filter="pacific">태평양 전투</button>
      <button class="hbtn active" data-filter="africa">북아프리카 전투</button>
    </div>
    <div id="speed-wrap">
      <label>속도</label>
      <input type="range" id="speed-slider" min="1" max="12" value="4">
      <span id="speed-val">4×</span>
    </div>
  </div>
  <div id="main">
    <div id="map-wrap">
      <div id="loading">
        <div id="loading-text">세계 지도 로딩 중...</div>
        <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
      </div>
      <svg id="map-svg"></svg>
      <div id="map-tooltip"></div>
      <div id="mpanel-btn">ℹ</div>
      <div id="size-legend">
        <div id="size-legend-header" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:5px;" onclick="toggleSizeLegend()">
          <span style="font-size:8px;color:var(--tan);letter-spacing:0.06em;">전투 규모</span>
          <span id="size-legend-arrow" style="font-size:10px;color:var(--muted);">▲</span>
        </div>
        <div id="size-legend-body">
          <div class="sl-row"><svg width="22" height="22"><circle cx="11" cy="11" r="5" fill="#888"/></svg>소규모 (링 없음)</div>
          <div class="sl-row"><svg width="22" height="22"><circle cx="11" cy="11" r="5" fill="#888"/><circle cx="11" cy="11" r="9" fill="none" stroke="#888" stroke-width="1.2"/></svg>중규모 (링 1개)</div>
          <div class="sl-row"><svg width="26" height="26"><circle cx="13" cy="13" r="5" fill="#888"/><circle cx="13" cy="13" r="9" fill="none" stroke="#888" stroke-width="1.2"/><circle cx="13" cy="13" r="13" fill="none" stroke="#888" stroke-width="1" opacity="0.6"/></svg>대규모 (링 2개)</div>
        </div>
      </div>
      <div id="timeline-bar">
        <div id="tl-top">
          <div id="tl-phase">전황</div>
          <div id="tl-hint">Space: 재생/정지 · ← →: 월 이동</div>
        </div>
        <div id="timeline-labels">
          <span>1939</span><span>1940</span><span>1941</span>
          <span>1942</span><span>1943</span><span>1944</span><span>1945</span>
        </div>
        <input type="range" id="timeline-slider" min="0" max="72" value="0" step="1">
        <div id="event-ticks"></div>
      </div>
    </div>
    <div id="side-panel">
      <div id="panel-tabs">
        <div class="tab active" data-tab="info">전투 정보</div>
        <div class="tab" data-tab="list">전투 목록</div>
      </div>
      <div id="panel-content">
        <div id="auto-highlight">
          <div class="ah-label">● 이 시점의 주요 전투</div>
          <div class="ah-name" id="ah-name">—</div>
          <div class="ah-meta" id="ah-meta"></div>
        </div>
        <div id="battle-detail"></div>
        <div id="battle-list"></div>
        <div id="panel-placeholder" style="color:var(--muted);font-size:11px;line-height:1.9;margin-top:4px;">
          지도의 마커를 클릭하거나<br>전투 목록을 확인하세요.<br><br>
          <span style="font-family:'Share Tech Mono',monospace;font-size:8px;opacity:.6;">
          타임라인으로 전황 변화를<br>확인하세요.
          </span>
        </div>
      </div>
      <div id="legend">
        <div class="legend-row"><div class="ls" style="background:#2a5298"></div>연합국 점령/통제</div>
        <div class="legend-row"><div class="ls" style="background:#982a2a"></div>추축국 점령/통제</div>
        <div class="legend-row"><div class="ls" style="background:#6b4a28"></div>비시 프랑스 (괴뢰)</div>
        <div class="legend-row"><div class="ls" style="background:#3a4228"></div>중립국</div>
        <div class="legend-row"><div class="ls dot" style="background:#3a9fd8"></div>연합군 승전 마커</div>
        <div class="legend-row"><div class="ls dot" style="background:#d44030"></div>추축군 승전 마커</div>
        <div class="legend-row"><div style="width:20px;height:2px;background:#d44030;border-radius:1px;flex-shrink:0;"></div>추축 전선</div>
        <div class="legend-row"><div style="width:20px;height:2px;border-top:2px dashed #3a9fd8;flex-shrink:0;"></div>연합 전선</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── BATTLES (scale 1-10 → marker radius 1.5–4.5 via scaleToRadius) ─────────
const BATTLES = [
  {id:'poland',    name:'폴란드 침공',       loc:'폴란드 바르샤바',        lat:52.2, lon:21.0, month:0,  result:'axis',   theater:'europe',  scale:8,
   desc:'독일과 소련이 폴란드를 동서에서 협공. 35일 만에 함락되며 2차대전이 시작됐다. 전격전(Blitzkrieg) 전술이 처음 대규모로 사용됐다.',
   allied:'폴란드·영국·프랑스', axis:'독일·소련', casualties:'20만 명 이상',
   commanders:[{side:'allied',name:'리즈-시미그위 원수'},{side:'axis',name:'브라우히치 대장 / 보로실로프'}]},
  {id:'finland',   name:'겨울 전쟁',          loc:'핀란드',                 lat:61.5, lon:26.0, month:3,  result:'axis',   theater:'europe',  scale:5,
   desc:'소련의 핀란드 침공. 핀란드군의 완강한 저항으로 소련군이 막대한 피해를 입었지만 결국 핀란드는 영토를 할양했다.',
   allied:'핀란드', axis:'소련', casualties:'35만 명 이상',
   commanders:[{side:'allied',name:'만네르헤임 원수'},{side:'axis',name:'티모셴코 원수'}]},
  {id:'norway',    name:'노르웨이 침공',       loc:'노르웨이 오슬로',        lat:59.9, lon:10.7, month:7,  result:'axis',   theater:'europe',  scale:5,

function getState(iso, m) {
  const arr = CONTROL[iso];
  if (!arr) return null;
  for (const s of arr) if (m >= s.f && m <= s.t) return s.s;
  return null;
}
function monthToLabel(m) {
  const d = new Date(1939, 8 + m, 1);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`;
}
function scaleToRadius(s){
  const mobile = window.matchMedia('(pointer: coarse)').matches;
  return mobile ? 2 + (s/10)*5 : 3 + (s/10)*6;
}

// ── STATE ─────────────────────────────────────────────────────────────────
let currentMonth = 0, playing = false, speed = 4, playInterval = null;
let selectedBattle = null, activeTab = 'info';
let activeFilters = new Set(['europe','pacific','africa']);

const svg = d3.select('#map-svg');
const mapWrap = document.getElementById('map-wrap');
let W = mapWrap.clientWidth, H = mapWrap.clientHeight;
const projection = d3.geoNaturalEarth1().rotate([-15, 0]).fitSize([W, H], {type:'Sphere'});
const pathGen = d3.geoPath().projection(projection);

const zoomBeh = d3.zoom().scaleExtent([1,10]).on('zoom', ev => {
  g.attr('transform', ev.transform);
});
svg.call(zoomBeh);
svg.on('dblclick.zoom', null);
svg.on('dblclick', () => svg.transition().duration(400).call(zoomBeh.transform, d3.zoomIdentity));

const g = svg.append('g');
// Solid background rect behind everything — prevents white flash on mobile
svg.insert('rect', 'g')
  .attr('width', '100%').attr('height', '100%')
  .attr('fill', '#0b1520');
g.append('path').datum({type:'Sphere'}).attr('fill','#0b1520').attr('stroke','none').attr('d', pathGen);
g.append('path').datum(d3.geoGraticule()()).attr('fill','none').attr('stroke','rgba(255,255,255,0.03)').attr('stroke-width','0.4').attr('d', pathGen);

const countryGroup   = g.append('g').attr('id','countries');
const frontlineGroup = g.append('g').attr('id','frontlines');
const markerGroup    = g.append('g').attr('id','markers');

// ── AUTO RECENTRE ─────────────────────────────────────────────────────────
// 0–26:  유럽 중심 (-15)
// 27–50: 균형 (-80, 양쪽 모두 보임)
// 51–70: 유럽 중심 (-15)
// 71–72: 태평양 중심 (-150)
function getRotationForMonth(m) {
  if (m <= 26)  return -15;
  if (m <= 50)  return -80;
  if (m <= 70)  return -15;
  return -150;
}

let recentreRaf = null;
let lastRotationTarget = null; // null = not yet set, always run on first call

function recentreMap(month) {
  // Fix 1: skip rotation entirely when a battle is selected (zoom is active)
  if (selectedBattle) return;

  const target = getRotationForMonth(month);
  if (target === lastRotationTarget) return;
  lastRotationTarget = target;

  // Fix 3: if cancelling an in-progress animation, restore fill transition first
  if (recentreRaf) {
    cancelAnimationFrame(recentreRaf);
    recentreRaf = null;
    countryGroup.selectAll('path').style('transition', 'fill 0.7s ease');
  }

  const startRot = projection.rotate()[0];
  let delta = target - startRot;
  if (delta > 180)  delta -= 360;
  if (delta < -180) delta += 360;
  if (Math.abs(delta) < 1) return;

  const dur = 900;
  const t0 = performance.now();

  svg.transition().duration(300).call(zoomBeh.transform, d3.zoomIdentity);

  function step(now) {
    const t = Math.min((now - t0) / dur, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    projection.rotate([startRot + delta * ease, 0]);
    countryGroup.selectAll('path').style('transition', 'none');
    g.selectAll('path').attr('d', pathGen);
    const lineGen = d3.line().x(d => projection(d)[0]).y(d => projection(d)[1]).curve(d3.curveCatmullRom.alpha(0.5));
    frontlineGroup.selectAll('path.frontline').each(function() {
      const fl = d3.select(this).datum();
      if (fl && fl.points) d3.select(this).attr('d', lineGen(fl.points.map(p => [p[0], p[1]])));
    });
    markerGroup.selectAll('g.battle-marker').attr('transform', d => {
      const p = projection([d.lon, d.lat]);
      return p ? `translate(${p[0]},${p[1]})` : 'translate(-9999,-9999)';
    });
    if (t < 1) {
      recentreRaf = requestAnimationFrame(step);
    } else {
      recentreRaf = null;
      countryGroup.selectAll('path').style('transition', 'fill 0.7s ease');
    }
  }
  recentreRaf = requestAnimationFrame(step);
}

// ── LOAD MAP ──────────────────────────────────────────────────────────────
async function loadMap() {
  document.getElementById('loading-bar').style.width = '20%';
  const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  document.getElementById('loading-bar').style.width = '60%';
  const world = await res.json();
  document.getElementById('loading-bar').style.width = '80%';

  const features = topojson.feature(world, world.objects.countries).features;

  countryGroup.selectAll('path')
    .data(features).join('path')
    .attr('class','country').attr('d', pathGen)
    .attr('fill', DEFAULT_COLOR)
    .attr('data-iso', d => NUM_TO_A2[String(d.id).padStart(3,'0')] || '')
    .on('mouseenter', function(ev, d) {
      const iso = this.getAttribute('data-iso');
      const st = getState(iso, currentMonth);
      if (!st) return;
      const label = {allied:'연합국',axis:'추축국',neutral:'중립국',vichy:'비시 프랑스'}[st];
      const cname = A2_NAMES[iso] || iso;
      showTooltip(ev, `<strong>${cname}</strong> · ${label}`);
    })
    .on('mouseleave', hideTooltip);

  buildFrontlines();
  buildMarkers();
  buildEventTicks();
  buildBattleList();

  document.getElementById('loading-bar').style.width = '100%';
  setTimeout(() => document.getElementById('loading').style.display='none', 350);
  updateMap();
}

// ── FRONTLINES ────────────────────────────────────────────────────────────
function buildFrontlines() {
  frontlineGroup.selectAll('*').remove();
  const lineGen = d3.line().x(d => projection(d)[0]).y(d => projection(d)[1]).curve(d3.curveCatmullRom.alpha(0.5));

  for (const fl of FRONTLINES) {
    frontlineGroup.append('path')
      .datum(fl)                         // keep datum so recentreMap can re-project
      .attr('class', `frontline frontline-${fl.type}`)
      .attr('d', lineGen(fl.points.map(p => [p[0], p[1]])))
      .attr('data-from', fl.from)
      .attr('data-to',   fl.to)
      .attr('data-theater', fl.theater)
      .style('display','none');
  }
}

function updateFrontlines() {
  frontlineGroup.selectAll('path.frontline').each(function() {
    const from = +this.getAttribute('data-from');
    const to   = +this.getAttribute('data-to');
    const theater = this.getAttribute('data-theater');
    const inTime = currentMonth >= from && currentMonth <= to;
    const inFilter = activeFilters.has(theater);
    d3.select(this).style('display', inTime && inFilter ? 'block' : 'none');
  });
}

// scale 1-4: 링 없음 (소), 5-7: 링 1개 (중), 8-10: 링 2개 (대)
function ringCount(s) { return s <= 4 ? 0 : s <= 7 ? 1 : 2; }
function scaleToRadius(s) {
  const mobile = window.matchMedia('(pointer: coarse)').matches;
  return mobile ? 4 : 5;
}
function ringGap(s) { return window.matchMedia('(pointer: coarse)').matches ? 4 : 4; }

// ── MARKERS ───────────────────────────────────────────────────────────────
function buildMarkers() {
  const color = d => d.result === 'allied' ? '#3a9fd8' : '#d44030';

  const groups = markerGroup.selectAll('g.battle-marker')
    .data(BATTLES).join('g')
    .attr('class','battle-marker')
    .attr('transform', d => { const p = projection([d.lon,d.lat]); return p?`translate(${p[0]},${p[1]})`:'translate(-9999,-9999)'; })
    .style('display','none')
    .on('click', (e,d) => { e.stopPropagation(); selectBattle(d); })
    .on('mouseenter', (e,d) => showTooltip(e, `<strong style="color:${color(d)}">${d.name}</strong><br>${monthToLabel(d.month)} · ${d.loc}<br>규모: ${d.scale <= 4 ? '소' : d.scale <= 7 ? '중' : '대'}`))
    .on('mouseleave', hideTooltip)
    .on('touchstart', function(e,d){ e.preventDefault(); selectBattle(d); },{passive:false});

  // pulse ring (always outermost)
  groups.append('circle').attr('class','bm-pulse').attr('r',0)
    .attr('fill','none')
    .attr('stroke', color).attr('stroke-width',0.8).attr('opacity',0);

  // outer ring 2 (대규모만)
  groups.append('circle').attr('class','bm-ring2')
    .attr('r', d => scaleToRadius(d.scale) + ringGap(d.scale) * 2)
    .attr('fill','none')
    .attr('stroke', color).attr('stroke-width', 1)
    .attr('opacity', d => ringCount(d.scale) >= 2 ? 0.6 : 0);

  // outer ring 1 (중·대규모)
  groups.append('circle').attr('class','bm-ring1')
    .attr('r', d => scaleToRadius(d.scale) + ringGap(d.scale))
    .attr('fill','none')
    .attr('stroke', color).attr('stroke-width', 1.2)
    .attr('opacity', d => ringCount(d.scale) >= 1 ? 0.75 : 0);

  // core dot
  groups.append('circle').attr('class','bm-dot')
    .attr('r', d => scaleToRadius(d.scale))
    .attr('fill', color)
    .attr('stroke','rgba(255,255,255,0.6)').attr('stroke-width',1);

  animatePulse();
}

function animatePulse() {
  setInterval(() => {
    markerGroup.selectAll('circle.bm-pulse')
      .filter(function(){ return d3.select(this.parentNode).style('display') !== 'none'; })
      .attr('r', d => scaleToRadius(d.scale) + ringGap(d.scale) * (ringCount(d.scale) >= 2 ? 3 : 2))
      .attr('opacity', 0.55)
      .transition().duration(1600).ease(d3.easeQuadOut)
      .attr('r', d => scaleToRadius(d.scale) + ringGap(d.scale) * (ringCount(d.scale) >= 2 ? 5 : 4))
      .attr('opacity', 0);
  }, 1800);
}

function updateMarkers() {
  markerGroup.selectAll('g.battle-marker').each(function(d) {
    const diff = currentMonth - d.month;
    const inFilter = activeFilters.has(d.theater);
    let show = false, past = false;
    if (inFilter && diff >= 0 && diff <= 3) { show = true; }
    else if (inFilter && diff > 3 && diff <= 24) { show = true; past = true; }
    d3.select(this).style('display', show ? 'block' : 'none');
    d3.select(this).classed('bm-past', past);
    const opacity = past ? 0.25 : 1;
    d3.select(this).select('circle.bm-dot').attr('opacity', opacity);
    d3.select(this).select('circle.bm-ring1').attr('opacity', function(d){ return past ? 0 : (ringCount(d.scale)>=1 ? 0.75 : 0); });
    d3.select(this).select('circle.bm-ring2').attr('opacity', function(d){ return past ? 0 : (ringCount(d.scale)>=2 ? 0.6  : 0); });
    d3.select(this).select('circle.bm-pulse').style('display', past ? 'none' : 'block');
  });
}

// ── AUTO HIGHLIGHT ────────────────────────────────────────────────────────
function updateAutoHighlight() {
  if (activeTab !== 'info' || selectedBattle) return;
  // find nearest battle within ±2 months
  let nearest = null, minDiff = 999;
  for (const b of BATTLES) {
    if (!activeFilters.has(b.theater)) continue;
    const diff = Math.abs(b.month - currentMonth);
    if (diff < minDiff) { minDiff = diff; nearest = b; }
  }
  const el = document.getElementById('auto-highlight');
  if (nearest && minDiff <= 3) {
    el.classList.add('visible');
    document.getElementById('ah-name').textContent = nearest.name;
    document.getElementById('ah-meta').textContent = `${monthToLabel(nearest.month)} · ${nearest.loc}`;
    document.getElementById('ah-name').onclick = () => selectBattle(nearest);
  } else {
    el.classList.remove('visible');
  }
}

// ── MAP UPDATE ────────────────────────────────────────────────────────────
function updateMap() {
  countryGroup.selectAll('path').attr('fill', function() {
    const iso = this.getAttribute('data-iso');
    const st = getState(iso, currentMonth);
    return st ? (STATE_COLORS[st] || DEFAULT_COLOR) : DEFAULT_COLOR;
  });
  updateFrontlines();
  updateMarkers();
  updateAutoHighlight();
  document.getElementById('date-display').textContent = monthToLabel(currentMonth);
  document.getElementById('tl-phase').textContent = getPhase(currentMonth);
  document.getElementById('timeline-slider').value = currentMonth;
  recentreMap(currentMonth);
}

// ── BATTLE DETAIL ─────────────────────────────────────────────────────────
function selectBattle(b) {
  selectedBattle = b;
  document.getElementById('panel-placeholder').style.display = 'none';
  document.getElementById('auto-highlight').classList.remove('visible');

  const cmdrHtml = b.commanders.map(c =>
    `<div class="cmdr-row"><span class="cmdr-side cmdr-${c.side}">${c.side==='allied'?'연합':'추축'}</span><span class="cmdr-name">${c.name}</span></div>`
  ).join('');

  document.getElementById('battle-detail').innerHTML = `
    <div class="b-name">${b.name}</div>
    <div class="b-meta">${monthToLabel(b.month)} · ${b.loc}</div>
    <div class="b-badge ${b.result==='allied'?'ba':'bx'}">${b.result==='allied'?'연합군 승리':'추축군 승리'}</div>
    <div class="b-desc">${b.desc}</div>
    <div class="stat-row"><span class="stat-label">연합군</span><span class="stat-val">${b.allied}</span></div>
    <div class="stat-row"><span class="stat-label">추축군</span><span class="stat-val">${b.axis}</span></div>
    <div class="stat-row"><span class="stat-label">총 사상자</span><span class="stat-val">${b.casualties}</span></div>
    <div class="b-commanders"><div class="b-cmdr-title">주요 지휘관</div>${cmdrHtml}</div>
  `;
  // Fix 5: let setTab manage all display states cleanly
  setTab('info');

  // Zoom to battle — fixed scale 3 regardless of current zoom
  const p = projection([b.lon, b.lat]);
  if (p) {
    svg.transition().duration(650).call(zoomBeh.transform,
      d3.zoomIdentity.translate(W/2 - 3*p[0], H/2 - 3*p[1]).scale(3));
  }
  document.getElementById('side-panel').classList.add('open');
  // highlight active item in list
  document.querySelectorAll('.battle-item').forEach(el => el.classList.toggle('active-item', el.dataset.id === b.id));
}

// ── BATTLE LIST ───────────────────────────────────────────────────────────
function buildBattleList() {
  const el = document.getElementById('battle-list');
  const sorted = [...BATTLES].sort((a,b) => a.month - b.month);
  for (const b of sorted) {
    const item = document.createElement('div');
    item.className = 'battle-item'; item.dataset.id = b.id;
    item.innerHTML = `<span class="ri-${b.result==='allied'?'a':'x'}">${b.result==='allied'?'연합군 승':'추축군 승'}</span><div class="bi-name">${b.name}</div><div class="bi-meta">${monthToLabel(b.month)} · ${b.loc}</div>`;
    item.addEventListener('click', () => { selectBattle(b); currentMonth=b.month; updateMap(); });
    el.appendChild(item);
  }
}

// ── EVENT TICKS ───────────────────────────────────────────────────────────
function buildEventTicks() {
  const el = document.getElementById('event-ticks');
  const sorted = [...BATTLES].sort((a,b) => a.month - b.month);
  for (const b of sorted) {
    const tick = document.createElement('div');
    tick.className = `tick ${b.result}`;
    tick.dataset.id = b.id;
    tick.dataset.theater = b.theater;
    tick.style.left = (b.month/72*100)+'%';
    tick.title = b.name;
    tick.addEventListener('click', () => { currentMonth=b.month; document.getElementById('timeline-slider').value=currentMonth; updateMap(); selectBattle(b); });
    el.appendChild(tick);
  }
  filterTicks();
}
function filterTicks() {
  document.querySelectorAll('.tick').forEach(t => {
    t.classList.toggle('hidden-tick', !activeFilters.has(t.dataset.theater));
  });
}

// ── TABS ──────────────────────────────────────────────────────────────────
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  const det = document.getElementById('battle-detail');
  const lst = document.getElementById('battle-list');
  const ph  = document.getElementById('panel-placeholder');
  if (tab==='info') {
    det.style.display = selectedBattle ? 'block' : 'none';
    lst.style.display = 'none';
    ph.style.display  = selectedBattle ? 'none' : 'block';
    updateAutoHighlight();
  } else {
    det.style.display = 'none';
    lst.style.display = 'block';
    ph.style.display  = 'none';
    document.getElementById('auto-highlight').classList.remove('visible');
  }
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => setTab(t.dataset.tab)));

// ── TOOLTIP ───────────────────────────────────────────────────────────────
const tooltipEl = document.getElementById('map-tooltip');
function showTooltip(ev, html) {
  const r = mapWrap.getBoundingClientRect();
  tooltipEl.innerHTML = html; tooltipEl.style.display = 'block';
  tooltipEl.style.left = (ev.clientX - r.left + 13)+'px';
  tooltipEl.style.top  = (ev.clientY - r.top - 10)+'px';
}
function hideTooltip() { tooltipEl.style.display = 'none'; }
svg.on('mousemove', function(ev) {
  if (tooltipEl.style.display==='block') {
    const r = mapWrap.getBoundingClientRect();
    tooltipEl.style.left=(ev.clientX-r.left+13)+'px';
    tooltipEl.style.top=(ev.clientY-r.top-10)+'px';
  }
});

// ── PLAYBACK ──────────────────────────────────────────────────────────────
const playBtn = document.getElementById('play-btn');
function startPlay() {
  playInterval = setInterval(() => {
    currentMonth = Math.min(72, currentMonth+1);
    updateMap();
    if (currentMonth>=72) { stopPlay(); }
  }, 1000/speed);
}
function stopPlay() {
  clearInterval(playInterval); playInterval=null;
  playing=false; playBtn.textContent='▶ 재생';
}
function togglePlay() {
  if (playing) { stopPlay(); return; }
  playing=true; playBtn.textContent='⏸ 정지';
  if (currentMonth>=72) { currentMonth=0; updateMap(); }
  startPlay();
}
playBtn.addEventListener('click', togglePlay);

document.getElementById('timeline-slider').addEventListener('input', function() {
  currentMonth = parseInt(this.value);
  selectedBattle = null;
  document.getElementById('battle-detail').style.display = 'none';
  document.getElementById('auto-highlight').classList.remove('visible');
  document.getElementById('panel-placeholder').style.display = 'block';
  document.querySelectorAll('.battle-item').forEach(el => el.classList.remove('active-item'));
  updateMap();
  if (playing) { clearInterval(playInterval); startPlay(); }
});
document.getElementById('speed-slider').addEventListener('input', function() {
  speed=parseInt(this.value);
  document.getElementById('speed-val').textContent=speed+'×';
  if (playing) { clearInterval(playInterval); startPlay(); }
});

// ── KEYBOARD ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', ev => {
  if (ev.target.tagName==='INPUT') return;
  if (ev.code==='Space') { ev.preventDefault(); togglePlay(); }
  if (ev.code==='ArrowRight' || ev.code==='ArrowLeft') {
    if (ev.code==='ArrowRight') currentMonth = Math.min(72, currentMonth+1);
    else                        currentMonth = Math.max(0,  currentMonth-1);
    selectedBattle = null;
    document.getElementById('battle-detail').style.display = 'none';
    document.getElementById('auto-highlight').classList.remove('visible');
    document.getElementById('panel-placeholder').style.display = 'block';
    document.querySelectorAll('.battle-item').forEach(el => el.classList.remove('active-item'));
    updateMap();
  }
});

// ── FILTERS ───────────────────────────────────────────────────────────────
document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', function() {
    const f = this.dataset.filter;
    if (activeFilters.has(f)) {
      if (activeFilters.size===1) return;
      activeFilters.delete(f); this.classList.remove('active');
    } else {
      activeFilters.add(f); this.classList.add('active');
    }
    filterTicks();
    updateMap();
  });
});

// ── MOBILE PANEL ──────────────────────────────────────────────────────────
document.getElementById('mpanel-btn').addEventListener('click', () => {
  const panel = document.getElementById('side-panel');
  const btn = document.getElementById('mpanel-btn');
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('panel-open', isOpen);
  btn.textContent = isOpen ? '✕' : 'ℹ';
});

// ── RESIZE ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W=mapWrap.clientWidth; H=mapWrap.clientHeight;
  projection.rotate(projection.rotate()).fitSize([W, H], {type:'Sphere'});
  lastRotationTarget = null;
  g.selectAll('path').attr('d', pathGen);
  countryGroup.selectAll('path').attr('d', pathGen);
  buildFrontlines(); updateFrontlines();
  markerGroup.selectAll('g.battle-marker').attr('transform', d => {
    const p = projection([d.lon,d.lat]); return p?`translate(${p[0]},${p[1]})`:'translate(-9999,-9999)';
  });
});

// ── SIZE LEGEND TOGGLE ────────────────────────────────────────────────────
function toggleSizeLegend() {
  const body = document.getElementById('size-legend-body');
  const arrow = document.getElementById('size-legend-arrow');
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? 'block' : 'none';
  arrow.textContent = hidden ? '▲' : '▼';
}
// mobile: start collapsed
if (window.matchMedia('(pointer: coarse)').matches) {
  document.getElementById('size-legend-body').style.display = 'none';
  document.getElementById('size-legend-arrow').textContent = '▼';
  document.getElementById('size-legend').style.display = 'block';
}
loadMap().catch(e => { document.getElementById('loading-text').textContent='로딩 실패: '+e.message; });
</script>
</body>
</html>
